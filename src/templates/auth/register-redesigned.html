<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册 - 家庭财务管理</title>

    <!-- 优雅字体组合 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;500;600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        :root {
            /* 温暖现代主义配色方案 */
            --color-bg-primary: #faf8f5;
            --color-bg-secondary: #ffffff;
            --color-bg-glass: rgba(255, 255, 255, 0.85);
            --color-text-primary: #2c2a26;
            --color-text-secondary: #6b675f;
            --color-text-muted: #9c988f;
            --color-accent-primary: #d4a574;
            --color-accent-secondary: #a3865a;
            --color-border-light: #e8e4e0;
            --color-border-medium: #d6d2cc;
            --color-shadow-soft: rgba(44, 42, 38, 0.08);
            --color-shadow-medium: rgba(44, 42, 38, 0.12);

            /* 渐变效果 */
            --gradient-primary: linear-gradient(135deg, #faf8f5 0%, #f5f1ea 100%);
            --gradient-accent: linear-gradient(135deg, #d4a574 0%, #c19563 100%);

            /* 间距系统 */
            --space-xs: 0.5rem;
            --space-sm: 1rem;
            --space-md: 1.5rem;
            --space-lg: 2rem;
            --space-xl: 3rem;
            --space-2xl: 4rem;

            /* 圆角系统 */
            --radius-sm: 0.5rem;
            --radius-md: 1rem;
            --radius-lg: 1.5rem;
            --radius-xl: 2rem;

            /* 过渡效果 */
            --transition-fast: 0.2s ease;
            --transition-normal: 0.3s ease;
            --transition-slow: 0.5s ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--gradient-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: var(--space-md);
            color: var(--color-text-primary);
            line-height: 1.6;
        }

        /* 主容器 */
        .auth-container {
            width: 100%;
            max-width: 420px;
            perspective: 1000px;
        }

        /* 玻璃质感卡片 */
        .auth-card {
            background: var(--color-bg-glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--color-border-light);
            border-radius: var(--radius-lg);
            padding: var(--space-xl);
            box-shadow:
                0 8px 32px var(--color-shadow-soft),
                0 2px 8px var(--color-shadow-medium);
            transform: translateY(0);
            transition: transform var(--transition-normal), box-shadow var(--transition-normal);
            position: relative;
            overflow: hidden;
        }

        .auth-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: var(--gradient-accent);
        }

        .auth-card:hover {
            transform: translateY(-2px);
            box-shadow:
                0 12px 40px var(--color-shadow-soft),
                0 4px 16px var(--color-shadow-medium);
        }

        /* 头部设计 */
        .auth-header {
            text-align: center;
            margin-bottom: var(--space-xl);
            position: relative;
        }

        .auth-header h1 {
            font-family: 'Crimson Pro', serif;
            font-size: 2.5rem;
            font-weight: 600;
            color: var(--color-text-primary);
            margin-bottom: var(--space-xs);
            letter-spacing: -0.02em;
        }

        .auth-subtitle {
            font-size: 1.1rem;
            color: var(--color-text-secondary);
            font-weight: 400;
        }

        /* 装饰性图标 */
        .auth-icon {
            width: 80px;
            height: 80px;
            margin: 0 auto var(--space-md);
            background: var(--gradient-accent);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            color: white;
            box-shadow: 0 4px 16px rgba(212, 165, 116, 0.3);
        }

        /* 表单样式 */
        .auth-form {
            display: flex;
            flex-direction: column;
            gap: var(--space-md);
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: var(--space-xs);
        }

        .form-group label {
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--color-text-primary);
            margin-bottom: 0.25rem;
        }

        .form-input {
            padding: var(--space-md);
            border: 2px solid var(--color-border-light);
            border-radius: var(--radius-sm);
            font-size: 1rem;
            background: var(--color-bg-secondary);
            transition: all var(--transition-fast);
            font-family: inherit;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--color-accent-primary);
            box-shadow: 0 0 0 3px rgba(212, 165, 116, 0.1);
            transform: translateY(-1px);
        }

        .form-input::placeholder {
            color: var(--color-text-muted);
        }

        /* 按钮设计 */
        .btn-primary {
            background: var(--gradient-accent);
            color: white;
            border: none;
            padding: var(--space-md) var(--space-lg);
            border-radius: var(--radius-sm);
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all var(--transition-fast);
            position: relative;
            overflow: hidden;
        }

        .btn-primary::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left var(--transition-slow);
        }

        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 16px rgba(212, 165, 116, 0.4);
        }

        .btn-primary:hover::before {
            left: 100%;
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        /* 链接样式 */
        .auth-links {
            text-align: center;
            margin-top: var(--space-lg);
        }

        .auth-links a {
            color: var(--color-accent-primary);
            text-decoration: none;
            font-weight: 500;
            transition: color var(--transition-fast);
            position: relative;
        }

        .auth-links a::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 0;
            height: 1px;
            background: var(--color-accent-primary);
            transition: width var(--transition-fast);
        }

        .auth-links a:hover {
            color: var(--color-accent-secondary);
        }

        .auth-links a:hover::after {
            width: 100%;
        }

        /* 表单提示文字 */
        .form-hint {
            font-size: 12px;
            color: var(--color-text-muted);
            margin-top: 4px;
        }

        /* 闪存消息 */
        .flash-messages {
            margin-bottom: var(--space-md);
        }

        .flash-message {
            padding: var(--space-md);
            background: rgba(212, 165, 116, 0.1);
            color: var(--color-accent-secondary);
            border-radius: var(--radius-sm);
            font-size: 0.9rem;
            border-left: 4px solid var(--color-accent-primary);
        }

        /* 响应式设计 */
        @media (max-width: 480px) {
            .auth-card {
                padding: var(--space-lg);
            }

            .auth-header h1 {
                font-size: 2rem;
            }

            .auth-icon {
                width: 60px;
                height: 60px;
                font-size: 1.5rem;
            }
        }

        /* 动画效果 */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .auth-card {
            animation: fadeInUp 0.6s ease-out;
        }

        .form-input {
            animation: fadeInUp 0.6s ease-out 0.1s both;
        }

        .btn-primary {
            animation: fadeInUp 0.6s ease-out 0.2s both;
        }

        .auth-links {
            animation: fadeInUp 0.6s ease-out 0.3s both;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <!-- 装饰性图标 -->
            <div class="auth-icon">📝</div>

            <div class="auth-header">
                <h1>家庭财务</h1>
                <p class="auth-subtitle">创建新账户</p>
            </div>

            {% with messages = get_flashed_messages() %}
                {% if messages %}
                    <div class="flash-messages">
                        {% for message in messages %}
                            <div class="flash-message">{{ message }}</div>
                        {% endfor %}
                    </div>
                {% endif %}
            {% endwith %}

            <form method="POST" class="auth-form">
                <div class="form-group">
                    <label for="username">用户名</label>
                    <input type="text" id="username" name="username" required
                           class="form-input"
                           placeholder="3-20个字符，字母、数字、下划线"
                           pattern="[a-zA-Z0-9_]{3,20}"
                           title="用户名只能包含字母、数字和下划线，长度3-20个字符"
                           autocomplete="username">
                    <small class="form-hint">3-20个字符，字母、数字、下划线</small>
                </div>

                <div class="form-group">
                    <label for="nickname">昵称（可选）</label>
                    <input type="text" id="nickname" name="nickname"
                           class="form-input"
                           placeholder="显示名称，如不填写则使用用户名">
                </div>

                <div class="form-group">
                    <label for="password">密码</label>
                    <input type="password" id="password" name="password" required
                           class="form-input"
                           placeholder="至少6个字符" minlength="6"
                           autocomplete="new-password">
                    <small class="form-hint">至少6个字符</small>
                </div>

                <button type="submit" class="btn-primary">注册</button>
            </form>

            <div class="auth-links">
                <p>已有账户？<a href="{{ url_for('auth.login') }}">立即登录</a></p>
            </div>
        </div>
    </div>

    <script>
        // 自动聚焦到用户名输入框
        document.addEventListener('DOMContentLoaded', function() {
            const usernameInput = document.getElementById('username');
            if (usernameInput) {
                usernameInput.focus();
            }
        });

        // 实时验证用户名格式
        document.getElementById('username').addEventListener('input', function(e) {
            const username = e.target.value;
            const pattern = /^[a-zA-Z0-9_]{3,20}$/;

            if (username && !pattern.test(username)) {
                e.target.setCustomValidity('用户名只能包含字母、数字和下划线，长度3-20个字符');
            } else {
                e.target.setCustomValidity('');
            }
        });

        // 微交互：输入框聚焦效果增强
        const inputs = document.querySelectorAll('.form-input');
        inputs.forEach(input => {
            input.addEventListener('focus', function() {
                this.parentElement.style.transform = 'translateY(-2px)';
            });

            input.addEventListener('blur', function() {
                this.parentElement.style.transform = 'translateY(0)';
            });
        });
    </script>
</body>
</html>
