[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = "test_*.py"
python_functions = "test_*"
addopts = "-v --tb=short"

[tool.coverage.run]
source = ["src"]
omit = [
    "src/database.py",
    "src/config.py",
]

[tool.coverage.report]
show_missing = true
skip_empty = true
fail_under = 50
