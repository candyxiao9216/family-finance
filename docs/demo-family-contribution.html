<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>家庭成员贡献视图 - Demo</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #faf8f5; padding: 20px; }
.container { max-width: 960px; margin: 0 auto; }
.title { text-align: center; margin-bottom: 24px; }
.title h1 { color: #8B7355; font-size: 20px; }
.title p { color: #999; font-size: 13px; margin-top: 6px; }
.card { background: #fff; border-radius: 12px; padding: 24px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
.card-title { font-size: 15px; font-weight: 600; color: #8B7355; margin-bottom: 16px; }
.charts-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; }
.chart-card { background: #fff; border-radius: 12px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
.chart-title { font-size: 13px; font-weight: 600; color: #8B7355; margin-bottom: 12px; text-align: center; }
.chart-wrap { max-width: 200px; margin: 0 auto; }
.desc { color: #666; font-size: 13px; padding: 12px; background: #f9f6f2; border-radius: 8px; line-height: 1.8; margin-bottom: 20px; }
.legend-row { display: flex; justify-content: center; gap: 20px; margin-top: 12px; font-size: 12px; }
.legend-item { display: flex; align-items: center; gap: 6px; }
.legend-dot { width: 10px; height: 10px; border-radius: 50%; }
@media (max-width: 768px) { .charts-row { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<div class="container">
    <div class="title">
        <h1>👨‍👩‍👧 家庭成员贡献视图 - Demo</h1>
        <p>在报表页面新增的家庭贡献区域</p>
    </div>

    <div class="desc">
        <strong>入口：</strong>报表页面（/reports）底部，现有趋势图/分类占比下方<br>
        <strong>条件：</strong>仅在"家庭"视图下显示（"我的"视图不显示）<br>
        <strong>数据范围：</strong>跟随报表页的时间筛选（近1/3/6/12个月）
    </div>

    <!-- 三个饼图 -->
    <div class="charts-row">
        <div class="chart-card">
            <div class="chart-title">收入贡献</div>
            <div class="chart-wrap">
                <canvas id="chart-income"></canvas>
            </div>
            <div class="legend-row">
                <div class="legend-item"><span class="legend-dot" style="background:#e8a87c;"></span>小美</div>
                <div class="legend-item"><span class="legend-dot" style="background:#aed6f1;"></span>小帅</div>
            </div>
        </div>
        <div class="chart-card">
            <div class="chart-title">支出分担</div>
            <div class="chart-wrap">
                <canvas id="chart-expense"></canvas>
            </div>
            <div class="legend-row">
                <div class="legend-item"><span class="legend-dot" style="background:#e8a87c;"></span>小美</div>
                <div class="legend-item"><span class="legend-dot" style="background:#aed6f1;"></span>小帅</div>
            </div>
        </div>
        <div class="chart-card">
            <div class="chart-title">资产占比</div>
            <div class="chart-wrap">
                <canvas id="chart-asset"></canvas>
            </div>
            <div class="legend-row">
                <div class="legend-item"><span class="legend-dot" style="background:#e8a87c;"></span>小美</div>
                <div class="legend-item"><span class="legend-dot" style="background:#aed6f1;"></span>小帅</div>
            </div>
        </div>
    </div>

    <!-- 明细表格 -->
    <div class="card" style="margin-top:20px;">
        <h3 class="card-title">贡献明细</h3>
        <table style="width:100%;border-collapse:collapse;font-size:13px;">
            <tr style="background:#f8f5f1;">
                <th style="padding:10px;text-align:left;">成员</th>
                <th style="padding:10px;text-align:left;">收入</th>
                <th style="padding:10px;text-align:left;">支出</th>
                <th style="padding:10px;text-align:left;">资产总额</th>
            </tr>
            <tr style="border-bottom:1px solid #f0ece7;">
                <td style="padding:10px;font-weight:500;">小美</td>
                <td style="padding:10px;color:#4CAF50;">¥68,338（100%）</td>
                <td style="padding:10px;color:#f44336;">¥9,569（100%）</td>
                <td style="padding:10px;">¥5,143,657（70.3%）</td>
            </tr>
            <tr>
                <td style="padding:10px;font-weight:500;">小帅</td>
                <td style="padding:10px;color:#4CAF50;">¥0（0%）</td>
                <td style="padding:10px;color:#f44336;">¥0（0%）</td>
                <td style="padding:10px;">¥2,173,154（29.7%）</td>
            </tr>
        </table>
    </div>
</div>

<script>
var COLORS = ['#e8a87c', '#aed6f1'];

// 收入贡献
new Chart(document.getElementById('chart-income'), {
    type: 'doughnut',
    data: {
        labels: ['小美', '小帅'],
        datasets: [{ data: [68338, 0], backgroundColor: COLORS }]
    },
    options: {
        responsive: true,
        plugins: {
            legend: { display: false },
            tooltip: {
                callbacks: {
                    label: function(ctx) {
                        var total = ctx.dataset.data.reduce(function(a,b){return a+b;}, 0);
                        var pct = total > 0 ? (ctx.raw / total * 100).toFixed(1) : '0.0';
                        return ctx.label + ': ¥' + ctx.raw.toLocaleString() + ' (' + pct + '%)';
                    }
                }
            }
        }
    }
});

// 支出分担
new Chart(document.getElementById('chart-expense'), {
    type: 'doughnut',
    data: {
        labels: ['小美', '小帅'],
        datasets: [{ data: [9569, 0], backgroundColor: COLORS }]
    },
    options: {
        responsive: true,
        plugins: {
            legend: { display: false },
            tooltip: {
                callbacks: {
                    label: function(ctx) {
                        var total = ctx.dataset.data.reduce(function(a,b){return a+b;}, 0);
                        var pct = total > 0 ? (ctx.raw / total * 100).toFixed(1) : '0.0';
                        return ctx.label + ': ¥' + ctx.raw.toLocaleString() + ' (' + pct + '%)';
                    }
                }
            }
        }
    }
});

// 资产占比
new Chart(document.getElementById('chart-asset'), {
    type: 'doughnut',
    data: {
        labels: ['小美', '小帅'],
        datasets: [{ data: [5143657, 2173154], backgroundColor: COLORS }]
    },
    options: {
        responsive: true,
        plugins: {
            legend: { display: false },
            tooltip: {
                callbacks: {
                    label: function(ctx) {
                        var total = ctx.dataset.data.reduce(function(a,b){return a+b;}, 0);
                        var pct = total > 0 ? (ctx.raw / total * 100).toFixed(1) : '0.0';
                        return ctx.label + ': ¥' + ctx.raw.toLocaleString() + ' (' + pct + '%)';
                    }
                }
            }
        }
    }
});
</script>
</body>
</html>
