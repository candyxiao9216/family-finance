<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>账号设置 - Demo</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #faf8f5; padding: 20px; }

.container { max-width: 640px; margin: 0 auto; }

.page-title { font-size: 20px; font-weight: 700; color: #8B7355; margin-bottom: 24px; padding-bottom: 12px; border-bottom: 3px solid #e8a87c; display: inline-block; }

.card { background: #fff; border-radius: 12px; padding: 24px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
.card-title { font-size: 15px; font-weight: 600; color: #8B7355; margin-bottom: 16px; }

.form-group { margin-bottom: 16px; }
.form-label { display: block; font-size: 13px; color: #666; margin-bottom: 6px; font-weight: 500; }
.form-input { width: 100%; padding: 10px 14px; border: 1px solid #e0dcd7; border-radius: 8px; font-size: 14px; background: #fff; transition: border-color 0.2s; }
.form-input:focus { outline: none; border-color: #8B7355; }
.form-input[readonly] { background: #f8f5f1; color: #999; cursor: not-allowed; }

.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

.btn { padding: 10px 20px; border: none; border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer; transition: all 0.2s; }
.btn-primary { background: linear-gradient(135deg, #e8a87c 0%, #d4956a 100%); color: #fff; }
.btn-primary:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(232,153,141,0.3); }
.btn-secondary { background: #f0ece7; color: #8B7355; }
.btn-secondary:hover { background: #e8e2dc; }
.btn-danger { background: #fff; color: #c0392b; border: 1px solid #f5c6cb; }
.btn-danger:hover { background: #ffe5e0; }

.info-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #f0ece7; }
.info-row:last-child { border-bottom: none; }
.info-label { font-size: 13px; color: #999; }
.info-value { font-size: 14px; color: #333; font-weight: 500; }

.avatar-section { display: flex; align-items: center; gap: 16px; margin-bottom: 20px; padding-bottom: 16px; border-bottom: 1px solid #f0ece7; }
.avatar { width: 56px; height: 56px; border-radius: 50%; background: linear-gradient(135deg, #e8a87c, #d4956a); display: flex; align-items: center; justify-content: center; font-size: 24px; color: #fff; font-weight: 600; }
.avatar-info { flex: 1; }
.avatar-name { font-size: 16px; font-weight: 600; color: #333; }
.avatar-role { font-size: 12px; color: #999; margin-top: 2px; }

.section-divider { height: 1px; background: #f0ece7; margin: 16px 0; }

.password-toggle { font-size: 12px; color: #8B7355; cursor: pointer; text-decoration: underline; margin-top: 8px; display: inline-block; }

.toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: #4a9; color: #fff; padding: 10px 24px; border-radius: 8px; font-size: 14px; display: none; z-index: 999; }
.toast.show { display: block; animation: fadeIn 0.3s; }
@keyframes fadeIn { from { opacity: 0; transform: translateX(-50%) translateY(-10px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }

/* 导航入口 Demo */
.nav-demo { background: #fff; border-radius: 12px; padding: 16px 20px; margin-bottom: 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); display: flex; justify-content: space-between; align-items: center; }
.nav-left { font-size: 16px; font-weight: 600; color: #8B7355; }
.nav-right { display: flex; align-items: center; gap: 12px; position: relative; }
.nav-user { font-size: 13px; color: #666; cursor: pointer; padding: 6px 12px; border-radius: 6px; transition: background 0.2s; }
.nav-user:hover { background: #f8f5f1; }
.nav-dropdown { position: absolute; top: 100%; right: 0; margin-top: 8px; background: #fff; border-radius: 8px; box-shadow: 0 4px 16px rgba(0,0,0,0.12); padding: 6px; min-width: 140px; display: none; }
.nav-dropdown.show { display: block; }
.nav-dropdown a { display: block; padding: 8px 12px; font-size: 13px; color: #333; text-decoration: none; border-radius: 6px; }
.nav-dropdown a:hover { background: #f8f5f1; }
.nav-dropdown a.danger { color: #c0392b; }

.hint { font-size: 11px; color: #999; margin-top: 4px; }

.emoji-btn { padding: 4px 10px; border: 1px solid #e0dcd7; border-radius: 6px; background: #fff; font-size: 14px; cursor: pointer; transition: all 0.2s; }
.emoji-btn:hover { background: #f8f5f1; border-color: #8B7355; }

.input-password-wrap { position: relative; }
.input-password-wrap .form-input { padding-right: 36px; }
.pwd-toggle { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); cursor: pointer; font-size: 16px; user-select: none; }
</style>
</head>
<body>

<div class="toast" id="toast"></div>

<div class="container">
    <!-- 导航入口演示 -->
    <div class="nav-demo">
        <div class="nav-left">家庭财务</div>
        <div class="nav-right">
            <span class="nav-user" onclick="toggleDropdown()">小美 ▾</span>
            <div class="nav-dropdown" id="nav-dropdown">
                <a href="#" onclick="showToast('跳转到账号设置页')">⚙️ 账号设置</a>
                <a href="#" class="danger" onclick="showToast('退出登录')">🚪 退出</a>
            </div>
        </div>
    </div>

    <h1 class="page-title">⚙️ 账号设置</h1>

    <!-- 基本信息 -->
    <div class="card">
        <div class="avatar-section">
            <div class="avatar">美</div>
            <div class="avatar-info">
                <div class="avatar-name">小美</div>
                <div class="avatar-role">家庭成员 · candy</div>
            </div>
        </div>

        <h3 class="card-title">基本信息</h3>

        <div class="form-group">
            <label class="form-label">昵称</label>
            <div style="display:flex;gap:8px;">
                <input type="text" class="form-input" value="小美" id="nickname-input" style="flex:1;">
                <button class="btn btn-primary" onclick="showToast('✅ 昵称已更新')">保存</button>
            </div>
            <span class="hint">修改后全站显示名称都会更新</span>
        </div>
    </div>

    <!-- 展示图标 -->
    <div class="card">
        <h3 class="card-title">展示图标</h3>
        <div style="display:flex;align-items:center;gap:16px;">
            <div style="display:flex;flex-direction:column;align-items:center;gap:6px;">
                <div id="icon-preview" style="width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,#e8a87c,#d4956a);display:flex;align-items:center;justify-content:center;font-size:18px;color:#fff;font-weight:600;">美</div>
                <span style="font-size:11px;color:#999;">预览</span>
            </div>
            <div style="flex:1;">
                <div style="display:flex;gap:8px;">
                    <input type="text" class="form-input" value="美" id="icon-input" maxlength="2" style="flex:1;" oninput="updateIconPreview(this.value)">
                    <button class="btn btn-primary" onclick="showToast('✅ 图标已更新')">保存</button>
                </div>
                <span class="hint">1-2个字或 emoji，显示在账户卡片的头像圆圈中</span>
            </div>
        </div>
        <div style="margin-top:12px;display:flex;gap:8px;flex-wrap:wrap;">
            <span style="font-size:11px;color:#999;line-height:28px;">快捷选择：</span>
            <button class="emoji-btn" onclick="setIcon('美')">美</button>
            <button class="emoji-btn" onclick="setIcon('💰')">💰</button>
            <button class="emoji-btn" onclick="setIcon('🐱')">🐱</button>
            <button class="emoji-btn" onclick="setIcon('🌟')">🌟</button>
            <button class="emoji-btn" onclick="setIcon('👶')">👶</button>
            <button class="emoji-btn" onclick="setIcon('🏠')">🏠</button>
            <button class="emoji-btn" onclick="setIcon('💎')">💎</button>
            <button class="emoji-btn" onclick="setIcon('🐻')">🐻</button>
        </div>
    </div>

    <!-- 修改密码 -->
    <div class="card">
        <h3 class="card-title">修改密码</h3>

        <div class="form-group">
            <label class="form-label">当前密码</label>
            <input type="password" class="form-input" placeholder="输入当前密码">
        </div>
        <div class="form-row">
            <div class="form-group">
                <label class="form-label">新密码</label>
                <div class="input-password-wrap">
                    <input type="password" class="form-input" id="new-pwd" placeholder="8位以上，含字母和数字">
                    <span class="pwd-toggle" onclick="togglePwd('new-pwd', this)">🙈</span>
                </div>
            </div>
            <div class="form-group">
                <label class="form-label">确认新密码</label>
                <div class="input-password-wrap">
                    <input type="password" class="form-input" id="confirm-pwd" placeholder="再次输入新密码">
                    <span class="pwd-toggle" onclick="togglePwd('confirm-pwd', this)">🙈</span>
                </div>
            </div>
        </div>
        <button class="btn btn-secondary" onclick="showToast('✅ 密码已修改')">修改密码</button>
    </div>

    <!-- 账号信息 -->
    <div class="card">
        <h3 class="card-title">账号信息</h3>
        <div class="info-row">
            <span class="info-label">用户名</span>
            <span class="info-value">candy</span>
        </div>
        <div class="info-row">
            <span class="info-label">注册时间</span>
            <span class="info-value">2026年05月08日</span>
        </div>
        <div class="info-row">
            <span class="info-label">所属家庭</span>
            <span class="info-value">小美家</span>
        </div>
        <div class="info-row">
            <span class="info-label">角色</span>
            <span class="info-value">成员</span>
        </div>
    </div>

    <!-- 危险操作 -->
    <div class="card" style="border:1px solid #f5c6cb;">
        <h3 class="card-title" style="color:#c0392b;">危险操作</h3>
        <div style="display:flex;justify-content:space-between;align-items:center;">
            <div>
                <div style="font-size:14px;font-weight:500;">注销账号</div>
                <div style="font-size:12px;color:#999;margin-top:2px;">删除账号及所有数据，此操作不可恢复</div>
            </div>
            <button class="btn btn-danger" onclick="showToast('⚠️ 确认注销？请联系管理员')">注销账号</button>
        </div>
    </div>
</div>

<script>
function showToast(msg) {
    var toast = document.getElementById('toast');
    toast.textContent = msg;
    toast.classList.add('show');
    setTimeout(function() { toast.classList.remove('show'); }, 2000);
}

function toggleDropdown() {
    document.getElementById('nav-dropdown').classList.toggle('show');
}

function updateIconPreview(val) {
    var preview = document.getElementById('icon-preview');
    preview.textContent = val || '美';
}

function setIcon(val) {
    document.getElementById('icon-input').value = val;
    updateIconPreview(val);
}

function togglePwd(inputId, toggle) {
    var input = document.getElementById(inputId);
    if (input.type === 'password') {
        input.type = 'text';
        toggle.textContent = '👁';
    } else {
        input.type = 'password';
        toggle.textContent = '🙈';
    }
}

// 点击其他地方关闭下拉
document.addEventListener('click', function(e) {
    if (!e.target.closest('.nav-right')) {
        document.getElementById('nav-dropdown').classList.remove('show');
    }
});
</script>

</body>
</html>
